[mypy]
python_version = 3.12
warn_unused_configs = True
show_error_codes = True
pretty = True
strict = True
follow_imports = skip
files = shelly_wallbox, dbus_shelly_wallbox_runtime_support.py, dbus_shelly_wallbox_shelly_io.py, dbus_shelly_wallbox_auto_logic.py, dbus_shelly_wallbox_update_cycle.py, dbus_shelly_wallbox_bootstrap.py, dbus_shelly_wallbox.py, shelly_wallbox_auto_input_helper.py, dbus_shelly_wallbox_state.py, dbus_shelly_wallbox_write_snapshot.py, tests/wallbox_test_fixtures.py, tests/test_shelly_wallbox_state_controller.py, tests/test_shelly_wallbox_write_controller.py, tests/test_shelly_wallbox_runtime_support_controller.py, tests/test_shelly_wallbox_ports.py, tests/test_shelly_wallbox_publisher_controller.py, tests/test_shelly_wallbox_auto_policy.py, tests/test_shelly_wallbox_main_module.py, tests/test_shelly_wallbox_dbus_inputs_controller.py, tests/test_shelly_wallbox_backend_factory.py, tests/test_shelly_wallbox_backend_probe.py, tests/test_shelly_wallbox_backend_switch.py, tests/test_shelly_wallbox_backend_template_switch.py, tests/test_shelly_wallbox_backend_template_meter.py, tests/test_shelly_wallbox_backend_template_charger.py

