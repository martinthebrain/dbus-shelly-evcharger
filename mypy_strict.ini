[mypy]
python_version = 3.12
warn_unused_configs = True
show_error_codes = True
pretty = True
strict = True
follow_imports = skip
files = venus_evcharger, venus_evcharger_service.py, venus_evcharger_auto_input_helper.py, tests/venus_evcharger_test_fixtures.py, tests/test_venus_evcharger_state_controller.py, tests/test_venus_evcharger_write_controller.py, tests/test_venus_evcharger_runtime_support_controller.py, tests/test_venus_evcharger_ports.py, tests/test_venus_evcharger_publisher_controller.py, tests/test_venus_evcharger_auto_policy.py, tests/test_venus_evcharger_main_module.py, tests/test_venus_evcharger_dbus_inputs_controller.py, tests/test_venus_evcharger_backend_factory.py, tests/test_venus_evcharger_backend_probe.py, tests/test_venus_evcharger_backend_switch.py, tests/test_venus_evcharger_backend_template_switch.py, tests/test_venus_evcharger_backend_template_meter.py, tests/test_venus_evcharger_backend_template_charger.py

[mypy-dbus]
ignore_missing_imports = True

[mypy-dbus.*]
ignore_missing_imports = True

[mypy-gi.*]
ignore_missing_imports = True

[mypy-gobject]
ignore_missing_imports = True

[mypy-vedbus]
ignore_missing_imports = True

[mypy-requests]
ignore_missing_imports = True

[mypy-requests.auth]
ignore_missing_imports = True
