[DEFAULT]
# Example configuration for the Shelly wallbox service.
#
# This file is intentionally written as a documented template so it can be
# published on GitHub without leaking local network details. Replace the
# placeholder host/IP/MAC values below with your real installation values.
#
# The service exposes a Shelly relay as a Victron EV charger tile on Venus OS.
# It can run in:
# - Manual mode: GUI Start/Stop directly controls the Shelly relay
# - Auto mode: relay decisions are based on PV surplus, grid import, battery
#   SOC, day windows, and several safety delays

# ---------------------------------------------------------------------------
# Basic service identity and logging
# ---------------------------------------------------------------------------

# Log level used by the wallbox Python service.
# Recommended values: ERROR, WARNING, INFO, DEBUG
Logging=INFO

# IP address or hostname of the Shelly device that physically switches the
# charging relay.
# Replace this example value with your own Shelly address.
Host=192.168.1.50

# Victron D-Bus device instance for this EV charger tile.
# Keep it unique on the GX device.
DeviceInstance=60

# Runtime state is stored in RAM so the service can restore UI state after a
# restart without wearing flash storage.
RuntimeStatePath=/run/dbus-shelly-wallbox-60.json

# Writable runtime tuning values from DBus/MQTT are persisted separately here.
# This keeps structural backend wiring in the main config while allowing safe
# day-to-day control values to survive restarts.
# Current overrideable DBus paths include the main control values plus:
#   /Auto/StartSurplusWatts
#   /Auto/StopSurplusWatts
#   /Auto/MinSoc
#   /Auto/ResumeSoc
#   /Auto/StartDelaySeconds
#   /Auto/StopDelaySeconds
#   /Auto/DbusBackoffBaseSeconds
#   /Auto/DbusBackoffMaxSeconds
#   /Auto/GridRecoveryStartSeconds
#   /Auto/StopSurplusDelaySeconds
#   /Auto/StopSurplusVolatilityLowWatts
#   /Auto/StopSurplusVolatilityHighWatts
#   /Auto/ReferenceChargePowerWatts
#   /Auto/LearnChargePowerEnabled
#   /Auto/LearnChargePowerMinWatts
#   /Auto/LearnChargePowerAlpha
#   /Auto/LearnChargePowerStartDelaySeconds
#   /Auto/LearnChargePowerWindowSeconds
#   /Auto/LearnChargePowerMaxAgeSeconds
#   /Auto/PhaseSwitching
#   /Auto/PhasePreferLowestWhenIdle
#   /Auto/PhaseUpshiftDelaySeconds
#   /Auto/PhaseDownshiftDelaySeconds
#   /Auto/PhaseUpshiftHeadroomWatts
#   /Auto/PhaseDownshiftMarginWatts
#   /Auto/PhaseMismatchRetrySeconds
#   /Auto/PhaseMismatchLockoutCount
#   /Auto/PhaseMismatchLockoutSeconds
#   /Auto/ScheduledEnabledDays
#   /Auto/ScheduledFallbackDelaySeconds
#   /Auto/ScheduledLatestEndTime
#   /Auto/ScheduledNightCurrent
RuntimeOverridesPath=/data/etc/dbus-shelly-wallbox-overrides-60.ini

# Base D-Bus service name. The final service becomes
# com.victronenergy.evcharger.http_<DeviceInstance>.
ServiceName=com.victronenergy.evcharger

# Human-readable connection description shown on D-Bus / in diagnostics.
Connection=Shelly 1PM Gen4 RPC

# Product and display names shown in the Victron GUI.
ProductName=Shelly Wallbox Meter
Name=Wallbox

# ---------------------------------------------------------------------------
# Polling and timing
# ---------------------------------------------------------------------------

# Main update cadence of the wallbox service in milliseconds.
PollIntervalMs=1000

# Helper-side polling for the three Auto-mode input classes.
AutoInputPollIntervalMs=2000
AutoPvPollIntervalMs=2000
AutoGridPollIntervalMs=2000
AutoBatteryPollIntervalMs=10000

# Periodic validation interval for helper snapshots.
AutoInputValidationPollSeconds=30

# Periodic "still alive" log line interval in minutes.
SignOfLifeLog=10

# ---------------------------------------------------------------------------
# Shelly hardware specifics
# ---------------------------------------------------------------------------

# Optional backend split examples:
# [Backends]
# Mode=split
# MeterType=none
# MeterType=shelly_meter
# MeterType=template_meter
# SwitchType=shelly_contactor_switch
# SwitchType=switch_group
# SwitchType=template_switch
# ChargerType=goe_charger
# ChargerType=modbus_charger
# ChargerType=smartevse_charger
# ChargerType=simpleevse_charger
# ChargerType=template_charger
# MeterConfigPath=/data/etc/wallbox-meter.ini
# SwitchConfigPath=/data/etc/wallbox-switch.ini
# ChargerConfigPath=/data/etc/wallbox-charger.ini
#
# MeterType=template_meter expects a small external HTTP/JSON adapter script.
# Optional [Adapter] auth for all template backends:
#   Username=<basic-or-digest-user>
#   Password=<basic-or-digest-password>
#   DigestAuth=0|1
#   AuthHeaderName=Authorization
#   AuthHeaderValue=Bearer <token>
# MeterType=none is supported for charger-native setups and requires ChargerType.
# In that case the service synthesizes PM status from fresh charger readback.
# SwitchType=none is also supported for charger-native split setups and
# requires ChargerType. Enable/disable then goes directly through the charger
# backend instead of a separate relay/switch adapter.
# With SwitchType=shelly_contactor_switch the switch backend defaults to
# contactor semantics, so direct Shelly switch-power limits are not enforced.
# SwitchType=switch_group is the generic coordinator for setups where each
# phase is driven by its own child switch adapter config.
# Example:
#   [Members]
#   P1=/data/etc/phase1-switch.ini
#   P2=/data/etc/phase2-switch.ini
#   P3=/data/etc/phase3-switch.ini
# Each child file may itself be a normal template_switch, shelly_switch,
# or shelly_contactor_switch backend and stays separately testable.
# Optional:
#   [Capabilities]
#   SupportedPhaseSelections=P1,P1_P2,P1_P2_P3
#
# Example standalone child config:
#   [Adapter]
#   Type=template_switch
#   BaseUrl=http://phase1.local
#   [StateRequest]
#   Url=/state
#   [StateResponse]
#   EnabledPath=enabled
#   [CommandRequest]
#   Url=/control
#
# SwitchType=shelly_contactor_switch remains the direct native Shelly preset
# for a single host/contact path.
# Optional native Shelly family preset:
#   [Adapter]
#   ShellyProfile=switch_1ch_with_pm
# Supported wallbox-focused presets:
#   switch_1ch
#   switch_1ch_with_pm
#   switch_multi_or_plug
#   switch_or_cover_profile
#   pm1_meter_only
#   em1_meter_single_or_dual
#   em_3phase_profiled
# The preset only fills the component namespace / default id; explicit
# Component= and Id= still win when you need a custom variant.
# Example:
# Optional native Shelly contactor feedback:
#   [Feedback]
#   Component=Input
#   Id=7
#   ValuePath=state
#   Invert=0
# Optional external interlock / ready signal:
#   [Interlock]
#   Component=Input
#   Id=8
#   ValuePath=state
#   Invert=0
# SwitchType=template_switch expects a small external HTTP/JSON adapter script.
# Optional template-switch [StateResponse] paths:
#   FeedbackClosedPath=<json path to auxiliary contact / feedback state>
#   InterlockOkPath=<json path to external interlock / ready signal>
# When configured, DBus additionally exposes:
#   /Auto/SwitchFeedbackClosed
#   /Auto/SwitchInterlockOk
#   /Auto/SwitchFeedbackMismatch
#   /Auto/LastSwitchFeedbackAge
# ChargerType=template_charger expects a small external HTTP/JSON charger adapter.
# ChargerType=goe_charger uses the documented local go-e HTTP API (`/api/status`
# and `/api/set`) for native enable/current control and live power/energy/state
# readback. This first native backend intentionally keeps phase switching
# conservative: observed phases are reported, but active phase changes stay
# disabled until go-e documents a stable public key for them.
# ChargerType=simpleevse_charger targets the documented SimpleEVSE WB/DIN
# Modbus map directly. It assumes the standard register layout and supports:
#   register 1000 -> configured current
#   register 1001 -> actual current
#   register 1004 -> runtime enable/disable
#   register 1006 -> EVSE state
#   register 1007 -> status/fault bits
# Native phase switching is not exposed by that board, so use a separate switch
# backend if you want external phase switching around a SimpleEVSE charger.
# If the SimpleEVSE installation is wired fixed 1P/2P/3P and no separate meter
# is present, [Capabilities] SupportedPhaseSelections may contain exactly one
# fixed layout like P1_P2_P3. Venus then shows estimated power/energy from
# charger current, voltage, and that configured phase count, marked via
# /Auto/ChargerEstimate*.
# Minimal example:
#   [Adapter]
#   Type=simpleevse_charger
#   Transport=serial_rtu
#   [Capabilities]
#   SupportedPhaseSelections=P1_P2_P3
#   [Transport]
#   Device=/dev/ttyUSB0
#   Baudrate=9600
#   Parity=N
#   StopBits=1
#   UnitId=1
# Optional serial RTU hardening:
#   PortOwner=venus              ; uses Victron serial-starter stop/start helpers
#   RetryCount=1                 ; retries one timed-out/offline request once
#   RetryDelaySeconds=0.2
# ChargerType=smartevse_charger targets the documented SmartEVSE-2 Modbus map
# conservatively. It uses:
#   register 0x0000 -> EVSE state
#   register 0x0001 -> error bits
#   register 0x0002 -> configured charging current
#   register 0x0005 -> access bit for enable/disable
# Native phase writes stay disabled in this first backend revision, so use a
# separate switch backend if you want explicit external phase switching.
# If the SmartEVSE installation is wired fixed 1P/2P/3P and no separate meter
# is present, [Capabilities] SupportedPhaseSelections may contain exactly one
# fixed layout like P1_P2_P3. Venus then shows estimated power/energy from
# charger current, voltage, and that configured phase count, marked via
# /Auto/ChargerEstimate*.
# Minimal example:
#   [Adapter]
#   Type=smartevse_charger
#   Transport=serial_rtu
#   [Capabilities]
#   SupportedPhaseSelections=P1_P2_P3
#   [Transport]
#   Device=/dev/ttyUSB0
#   Baudrate=9600
#   Parity=N
#   StopBits=1
#   UnitId=1
# ChargerType=modbus_charger is the layered Modbus EVSE path:
#   transport -> Modbus register client -> EVSE register profile
# Supported Transport values:
#   serial_rtu   (USB-RS485 and VE.Direct/TTL-to-RS485 serial links)
#   tcp
#   udp
# Minimal example:
#   [Adapter]
#   Type=modbus_charger
#   Profile=generic
#   Transport=tcp
#   [Transport]
#   Host=192.168.1.40
#   Port=502
#   UnitId=7
# For serial RTU on Venus OS the same [Transport] section may additionally use:
#   Device=/dev/ttyS7
#   PortOwner=venus
#   RetryCount=1
#   RetryDelaySeconds=0.2
#   [EnableWrite]
#   RegisterType=coil
#   Address=20
#   TrueValue=1
#   FalseValue=0
#   [CurrentWrite]
#   RegisterType=holding
#   Address=30
#   DataType=uint16
#   Scale=10
# At runtime the active selection becomes visible on DBus via:
#   /Auto/BackendMode
#   /Auto/MeterBackend
#   /Auto/SwitchBackend
#   /Auto/ChargerBackend
# Charger write failures and the last applied native current target are visible via:
#   /Auto/ChargerWriteErrors
#   /Auto/ChargerCurrentTarget
#   /Auto/ChargerCurrentTargetAge
# Validate that adapter config first with:
#   python3 -m shelly_wallbox.backend.probe validate /data/etc/wallbox-switch.ini
#   python3 -m shelly_wallbox.backend.probe validate /data/etc/wallbox-meter.ini
#   python3 -m shelly_wallbox.backend.probe validate /data/etc/wallbox-charger.ini
# Validate the full wallbox backend combination from this config with:
#   python3 -m shelly_wallbox.backend.probe validate-wallbox /data/etc/config.shelly_wallbox.ini

# Shelly RPC component and ID used for relay/power-state access.
# Typical Shelly relay devices use Switch / 0.
ShellyComponent=Switch
ShellyId=0

# Authentication for the Shelly HTTP/RPC API.
# Set DigestAuth=1 if your Shelly requires HTTP digest authentication.
DigestAuth=0
Username=
Password=

# Electrical phase assignment for the charger tile.
# Valid values:
# - L1, L2, L3: single-phase charger shown on one phase
# - 3P: split power/current over all three phases for display
Phase=L1

# Victron AC position:
# 0 = AC input 1
# 1 = AC output
# 2 = AC input 2
Position=1

# Minimum power above which the EV charger is shown as "charging" instead of
# merely "connected".
ChargingThresholdWatts=100

# Victron status code used for "relay on, but not actually charging yet".
IdleStatus=6

# These current values are display/runtime compatibility fields for the EV
# charger tile. A Shelly relay cannot actively set EV charging current via CP.
MinCurrent=6
MaxCurrent=16
SetCurrent=16

# If enabled, the EV charger tile mirrors the rounded current derived from the
# stable learned charging power on /SetCurrent. Disable this to always show the
# static SetCurrent compatibility value instead. When a native charger backend
# with real current control is configured, /SetCurrent keeps showing the real
# charger target and this display overlay is intentionally bypassed.
DisplayLearnedSetCurrent=1

# ---------------------------------------------------------------------------
# Initial GUI state after startup
# ---------------------------------------------------------------------------

# Mode:
# 0 = Manual
# 1 = Auto
# 2 = Scheduled/Plan
#     Runs normal Auto behavior first and, on enabled target days, can switch
#     to an overnight fallback after the daytime window is closed for
#     AutoScheduledNightStartDelaySeconds. That fallback ends at
#     AutoScheduledLatestEndTime or when the next daytime window opens.
Mode=0

# AutoStart controls whether Auto mode is allowed to start by itself.
AutoStart=1

# StartStop and Enable are restored into the virtual GUI state on startup.
StartStop=1
Enable=1

# Voltage interpretation when Phase=3P.
# - phase: the input voltage is already per-phase voltage
# - line_to_line: convert line-to-line voltage to per-phase voltage
ThreePhaseVoltageMode=phase

# ---------------------------------------------------------------------------
# Auto-mode PV input source selection
# ---------------------------------------------------------------------------

# Explicit PV service override. Leave empty to auto-discover.
AutoPvService=

# Prefix used when scanning Victron DBus for PV inverter services.
AutoPvServicePrefix=com.victronenergy.pvinverter

# AC PV power path used by Auto mode.
AutoPvPath=/Ac/Power

# Maximum number of PV services summed in Auto mode.
AutoPvMaxServices=10

# How often PV service discovery is refreshed.
AutoPvScanIntervalSeconds=300

# If enabled, Auto mode also considers the DC PV path below.
AutoUseDcPv=1
AutoDcPvService=com.victronenergy.system
AutoDcPvPath=/Dc/Pv/Power

# ---------------------------------------------------------------------------
# Auto-mode battery input
# ---------------------------------------------------------------------------

# Explicit battery service override. Leave empty to auto-discover by prefix.
AutoBatteryService=com.victronenergy.battery.example

# SOC path read from the battery service.
AutoBatterySocPath=/Soc

# Prefix used for battery service discovery when no explicit service is pinned.
AutoBatteryServicePrefix=com.victronenergy.battery

# How often battery service discovery is refreshed.
AutoBatteryScanIntervalSeconds=300

# If enabled, Auto mode may continue with fallback logic even if battery SOC is
# temporarily unavailable.
AutoAllowWithoutBatterySoc=1

# ---------------------------------------------------------------------------
# Auto-mode DBus retry and helper collision avoidance
# ---------------------------------------------------------------------------

# Backoff used after DBus read failures in Auto mode.
AutoDbusBackoffBaseSeconds=5
AutoDbusBackoffMaxSeconds=60

# If enabled, the helper will try to disable a parallel generic Shelly Venus
# integration that might otherwise fight for the same relay/device.
DisableGenericShellyDevice=1

# Generic Shelly D-Bus service prefix used for that one-shot disable helper.
GenericShellyService=com.victronenergy.shelly

# Example placeholder values. Replace them if you use the generic Shelly
# disable helper, or disable that feature entirely above.
GenericShellyDisableIp=192.168.1.50
GenericShellyDisableMac=001122334455
GenericShellyDisableChannel=1
GenericShellyAllowPersistentDisable=1
GenericShellyDisableDelaySeconds=180
GenericShellyScanIntervalSeconds=60

# ---------------------------------------------------------------------------
# Auto-mode grid input
# ---------------------------------------------------------------------------

AutoGridService=com.victronenergy.system
AutoGridL1Path=/Ac/Grid/L1/Power
AutoGridL2Path=/Ac/Grid/L2/Power
AutoGridL3Path=/Ac/Grid/L3/Power

# If set to 1, all three grid phases must be available.
# If set to 0, partial phase data is accepted.
AutoGridRequireAllPhases=1

# If grid data goes missing for longer than this, Auto mode falls back to a
# fail-safe state.
AutoGridMissingStopSeconds=60

# After a genuine grid-data outage, Auto mode waits this many seconds of fresh
# grid data before allowing a new Auto start again.
AutoGridRecoveryStartSeconds=10

# ---------------------------------------------------------------------------
# Auto-mode start/stop thresholds
# ---------------------------------------------------------------------------

# Battery protection thresholds.
AutoMinSoc=30
AutoResumeSoc=33

# Normal profile:
# Auto starts only when averaged surplus is at or above the start threshold.
# Auto stops on low surplus only after the softer stop logic has expired.
AutoStartSurplusWatts=1850
AutoStopSurplusWatts=1350

# Optional more aggressive profile used while SOC is comfortably high.
# The profile is activated above AutoHighSocThreshold and released again only
# below AutoHighSocReleaseThreshold to avoid jitter.
AutoHighSocThreshold=50
AutoHighSocReleaseThreshold=45
AutoHighSocStartSurplusWatts=1650
AutoHighSocStopSurplusWatts=800

# Rolling average window used for raw Auto decisions.
AutoAverageWindowSeconds=30

# ---------------------------------------------------------------------------
# Auto-mode learned charging power
# ---------------------------------------------------------------------------

# If enabled, the service learns the real charging power while the EV is
# already charging and uses that learned value to linearly scale the existing
# surplus thresholds.
AutoLearnChargePower=1

# Reference charging power in watts that the configured surplus thresholds are
# tuned for. As the normal/high-SOC thresholds were chosen around a charger
# drawing about 1900 W, it is probably a good idea to keep this at 1900 for now.
AutoReferenceChargePowerWatts=1900

# Only measurements at or above this power are considered plausible charging
# values for learning.
AutoLearnChargePowerMinWatts=500

# Minimum stable charging time before the learning logic starts updating the
# runtime estimate.
AutoLearnChargePowerStartDelaySeconds=30

# Learning only runs in the early steady-state part of a session. This avoids
# end-of-charge taper from dragging future start/stop thresholds downward.
# Set to 0 to keep learning active for the full charging session.
AutoLearnChargePowerWindowSeconds=180

# EWMA alpha used for the learned charging power itself.
# Lower values adapt more slowly, higher values follow changes faster.
AutoLearnChargePowerAlpha=0.2

# Learned charging power is reused only while it is still fresh enough to
# describe the currently connected EVSE. After this age, Auto mode falls back
# to the configured static thresholds until a new learning window completes.
# Set to 0 to disable age-based expiry.
AutoLearnChargePowerMaxAgeSeconds=21600

# ---------------------------------------------------------------------------
# Auto-mode multi-phase selection
# ---------------------------------------------------------------------------

# If enabled, Auto mode can move between supported phase selections step by
# step. The service always uses the existing staged phase-switch choreography
# when the active backend requires a relay-off pause first.
AutoPhaseSwitching=1

# Auto only moves up to a larger phase layout after the averaged surplus stayed
# high enough for this long.
AutoPhaseUpshiftDelaySeconds=120

# Auto may move down to a smaller phase layout a bit faster once the current
# layout no longer looks sustainable.
AutoPhaseDownshiftDelaySeconds=30

# Additional headroom above the theoretical MinCurrent power required before
# Auto upshifts to the next larger phase layout.
AutoPhaseUpshiftHeadroomWatts=250

# Hysteresis margin below the current layout's theoretical MinCurrent power
# before Auto downshifts to the next smaller phase layout.
AutoPhaseDownshiftMarginWatts=150

# After a confirmed phase-switch mismatch, suppress repeated Auto upshifts to
# the same target for this long before trying again.
AutoPhaseMismatchRetrySeconds=300

# After this many confirmed mismatches for the same upshift target, place that
# target into a longer lockout window instead of retrying immediately forever.
AutoPhaseMismatchLockoutCount=3

# Duration of the longer lockout after the mismatch counter reaches the
# threshold above.
AutoPhaseMismatchLockoutSeconds=1800

# While a lockout is active, the affected upshift target is removed from the
# effective supported phase set. GUI phase selection and Auto logic then only
# see the degraded subset until the lockout expires naturally or an operator
# writes 1 to /Auto/PhaseLockoutReset.

# After this many repeated heuristic contactor faults (suspected-open or
# suspected-welded), latch a safety lockout until an operator clears it via
# /Auto/ContactorLockoutReset.
AutoContactorFaultLatchCount=3

# A single heuristic contactor fault that stays active this long also latches
# the same safety lockout, even without repeated on/off episodes.
AutoContactorFaultLatchSeconds=60

# When Auto is idle and the relay is already off, prefer returning to the
# smallest supported phase layout so the next Auto start begins conservatively.
AutoPhasePreferLowestWhenIdle=1

# Minimum run/off times protect the relay and prevent rapid toggling.
AutoMinRuntimeSeconds=300
AutoMinOfftimeSeconds=120

# ---------------------------------------------------------------------------
# Auto-mode daytime windows
# ---------------------------------------------------------------------------

# If enabled, Auto mode is only allowed to start during the configured month-
# specific daylight windows below.
AutoDaytimeOnly=1

# Month-specific start/end times. These are examples and should be adapted to
# the real installation, season, and customer preference.
AutoJanStart=09:00
AutoJanEnd=16:30
AutoFebStart=08:30
AutoFebEnd=17:15
AutoMarStart=08:00
AutoMarEnd=18:00
AutoAprStart=07:30
AutoAprEnd=19:30
AutoMayStart=07:00
AutoMayEnd=20:30
AutoJunStart=07:00
AutoJunEnd=21:00
AutoJulStart=07:00
AutoJulEnd=21:00
AutoAugStart=07:00
AutoAugEnd=20:30
AutoSepStart=07:30
AutoSepEnd=19:30
AutoOctStart=08:00
AutoOctEnd=18:00
AutoNovStart=08:30
AutoNovEnd=17:00
AutoDecStart=09:00
AutoDecEnd=16:30

# When /Mode=2 (Scheduled/Plan), these weekdays define which next mornings are
# eligible for night fallback. Example: Mon-Fri means Sunday night may charge
# for Monday morning, but Friday night will not charge for Saturday morning.
AutoScheduledEnabledDays=Mon,Tue,Wed,Thu,Fri

# Keep using normal Auto behavior until this many seconds after the configured
# month-specific end time. After that, the charger may run overnight on enabled
# target days until AutoScheduledLatestEndTime or the next daytime window.
AutoScheduledNightStartDelaySeconds=3600

# Morning cutoff for the scheduled fallback window.
AutoScheduledLatestEndTime=06:30

# Dedicated charger current used during scheduled night fallback. Set this to 0
# to reuse MaxCurrent instead.
AutoScheduledNightCurrentAmps=0

# ---------------------------------------------------------------------------
# Auto-mode import limits and delays
# ---------------------------------------------------------------------------

# New Auto starts are blocked if grid import is already above this threshold.
AutoStartMaxGridImportWatts=50

# A running Auto session stops hard when grid import reaches this threshold.
AutoStopGridImportWatts=300

# Delay before an eligible Auto start is really executed.
AutoStartDelaySeconds=10

# Generic stop delay used for hard stop reasons like grid import or SOC.
AutoStopDelaySeconds=30

# Longer stop delay used specifically for "surplus fell too low" so short cloud
# events do not switch the charger off immediately.
AutoStopSurplusDelaySeconds=90

# ---------------------------------------------------------------------------
# Auto-mode adaptive smoothing
# ---------------------------------------------------------------------------

# Base EWMA alpha for stop-side smoothing.
AutoStopEwmaAlpha=0.35

# Alpha used when PV surplus is very stable.
AutoStopEwmaAlphaStable=0.55

# Alpha used when PV surplus is highly volatile.
AutoStopEwmaAlphaVolatile=0.15

# Volatility thresholds (in watts) that decide which EWMA alpha stage is used.
AutoStopSurplusVolatilityLowWatts=150
AutoStopSurplusVolatilityHighWatts=400

# ---------------------------------------------------------------------------
# Helper snapshot, Shelly soft-fail, and watchdog behavior
# ---------------------------------------------------------------------------

# Cached helper values may be reused for this long before they are considered
# unusable.
AutoInputCacheSeconds=120

# Helper snapshot file written to RAM.
AutoInputSnapshotPath=/run/dbus-shelly-wallbox-auto-60.json

# Helper restart settings.
AutoInputHelperRestartSeconds=5
AutoInputHelperStaleSeconds=15

# If Shelly readout temporarily fails, keep the last known Shelly state for a
# short time before declaring the device offline.
AutoShellySoftFailSeconds=10

# Global update watchdog.
AutoWatchdogStaleSeconds=180
AutoWatchdogRecoverySeconds=60

# Warmup after service start and holdoff after a manual GUI action.
AutoStartupWarmupSeconds=15
AutoManualOverrideSeconds=300

# Startup metadata retries for Shelly.GetDeviceInfo.
StartupDeviceInfoRetries=3
StartupDeviceInfoRetrySeconds=2

# If enabled, Auto mode stops at night once the daytime window is closed.
AutoNightLockStop=1

# ---------------------------------------------------------------------------
# Auto-mode audit log
# ---------------------------------------------------------------------------

# If enabled, significant Auto reasons are written to a compact audit log.
AutoAuditLog=1

# Log file written to RAM on Venus OS.
AutoAuditLogPath=/var/volatile/log/dbus-shelly-wallbox/auto-reasons.log

# Maximum age of retained log entries.
AutoAuditLogMaxAgeHours=168

# Identical reasons are only repeated after this many seconds.
AutoAuditLogRepeatSeconds=30
