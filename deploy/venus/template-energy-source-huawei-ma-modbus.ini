[Adapter]
# Huawei SUN2000 MA-family hybrid starter template.
# This template uses energy-storage-unit-1 signals plus inverter-wide power
# values as a practical read-only integration baseline.
Transport=tcp

[Transport]
Host=192.168.200.1
Port=6607
UnitId=0
RequestTimeoutSeconds=2.0

[SocRead]
RegisterType=holding
Address=37004
DataType=uint16
Scale=0.1

[BatteryPowerRead]
# Official meaning:
#   > 0 = charging
#   < 0 = discharging
# The wallbox energy model expects:
#   < 0 = charging battery
#   > 0 = discharging battery
# Therefore this template intentionally inverts Huawei's documented sign
# convention via Scale=-1 so the imported value matches the repo-internal
# net_battery_power_w semantics.
RegisterType=holding
Address=37001
DataType=int32
Scale=-1

[ChargeLimitPowerRead]
# Official rated charge power for energy storage unit 1.
RegisterType=holding
Address=37007
DataType=uint32
Scale=1

[DischargeLimitPowerRead]
# Official rated discharge power for energy storage unit 1.
RegisterType=holding
Address=37009
DataType=uint32
Scale=1

[AcPowerRead]
# Active power, documented in kW with gain 1000.
# Raw value therefore maps directly to watts.
RegisterType=holding
Address=32080
DataType=int32
Scale=1

[PvInputPowerRead]
# Official aggregate PV-side input power, documented in kW with gain 1000.
# Raw value therefore maps directly to watts.
RegisterType=holding
Address=32064
DataType=int32
Scale=1

[GridInteractionRead]
# Meter active power:
#   Huawei meter sign: > 0 = export to grid, < 0 = import from grid
#   Energy model sign: > 0 = import from grid, < 0 = export to grid
RegisterType=holding
Address=37113
DataType=int32
Scale=-1

[OperatingModeRead]
RegisterType=holding
Address=37006
DataType=uint16
Scale=1

[OperatingModeMap]
0=none
1=forcible_charge_discharge
2=time_of_use_lg
3=fixed_charge_discharge
4=maximise_self_consumption
5=fully_fed_to_grid
6=time_of_use_luna2000
7=remote_scheduling_maximum_self_use
8=remote_scheduling_full_internet_access
9=remote_scheduling_tou
10=ai_energy_management_and_scheduling
11=remote_scheduling_ai_energy_management
12=third_party_scheduling

[Aggregation]
AcPowerScopeKey={host}:{port}:inverter-ac-power
PvInputPowerScopeKey={host}:{port}:inverter-pv-input-power
GridInteractionScopeKey={host}:{port}:meter-active-power

# Aggregate PV input and meter-backed grid interaction are enabled here.
# The aggregation scope keys keep inverter-global and meter-global values from
# being double-counted if the same device is exposed through multiple source
# templates.
