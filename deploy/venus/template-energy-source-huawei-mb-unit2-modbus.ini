[Adapter]
# Huawei SUN2000 MB-family hybrid template for energy storage unit 2.
Transport=tcp

[Transport]
Host=192.168.200.1
Port=6607
UnitId=0
RequestTimeoutSeconds=2.0

[SocRead]
RegisterType=holding
Address=37738
DataType=uint16
Scale=0.1

[BatteryPowerRead]
# Huawei unit-2 sign:
#   > 0 = charging
#   < 0 = discharging
# Repo sign:
#   < 0 = charging
#   > 0 = discharging
RegisterType=holding
Address=37743
DataType=int32
Scale=-1

[AcPowerRead]
# Inverter-global active power. If unit1 and unit2 are configured together,
# keep this block enabled on only one of them to avoid double counting.
RegisterType=holding
Address=32080
DataType=int32
Scale=1

[PvInputPowerRead]
# Inverter-global total PV input power. If unit1 and unit2 are configured
# together, keep this block enabled on only one of them to avoid double
# counting the same inverter-wide PV total twice.
RegisterType=holding
Address=32064
DataType=int32
Scale=1

[GridInteractionRead]
# Meter-backed net grid power. This is meter-global, not unit-2-local.
# The sign is inverted so the imported value matches the repo-internal
# grid_interaction_w convention.
RegisterType=holding
Address=37113
DataType=int32
Scale=-1

[Aggregation]
AcPowerScopeKey={host}:{port}:inverter-ac-power
PvInputPowerScopeKey={host}:{port}:inverter-pv-input-power
GridInteractionScopeKey={host}:{port}:meter-active-power

# Unit-2 SOC and charge/discharge power are pinned here.
# A unit-2-specific working-mode or rated charge/discharge limit mapping has not
# been pinned yet, so those fields are intentionally left unset here.
