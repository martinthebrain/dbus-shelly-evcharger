[Adapter]
# Generic example for AutoEnergySource.<id>.Type=template_http
BaseUrl=http://hybrid.local
RequestTimeoutSeconds=2.0

[EnergyRequest]
Method=GET
Url=/api/energy

[EnergyResponse]
# Optional, but typically useful for combined SOC:
SocPath=data.soc
UsableCapacityWhPath=data.capacity_wh

# Signed battery power in watts:
#   negative = charging battery
#   positive = discharging battery
BatteryPowerPath=data.battery_power_w

# Optional AC-side power visibility for diagnostics and learning.
AcPowerPath=data.ac_power_w

# Optional online and confidence signals.
OnlinePath=data.online
ConfidencePath=data.confidence
