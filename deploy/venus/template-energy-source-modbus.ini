[Adapter]
# Generic example for AutoEnergySource.<id>.Type=modbus
Transport=tcp

[Transport]
Host=192.168.1.90
Port=502
UnitId=7
RequestTimeoutSeconds=2.0

[SocRead]
RegisterType=holding
Address=10
DataType=uint16
Scale=0.1

[UsableCapacityRead]
RegisterType=holding
Address=20
DataType=uint16

[BatteryPowerRead]
# Signed watts:
#   negative = charging battery
#   positive = discharging battery
RegisterType=holding
Address=30
DataType=int16

[AcPowerRead]
RegisterType=holding
Address=40
DataType=uint16
