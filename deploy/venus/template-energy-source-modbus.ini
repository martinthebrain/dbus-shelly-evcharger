[Adapter]
# Generic example for AutoEnergySource.<id>.Type=modbus
Transport=tcp

[Transport]
Host=192.168.1.90
Port=502
UnitId=7
RequestTimeoutSeconds=2.0

# For Huawei-style probing, keep the read mapping below and test candidates via:
#   python3 -m venus_evcharger.energy.probe detect-modbus-energy /data/etc/external-energy-modbus.ini --profile huawei_ma_native_ap
# The profile contributes host/port/unit-id candidates such as
# 192.168.200.1 + 6607/502 + unit 0/1 without forcing them into the steady-state
# config before you know which combination actually responds.

[SocRead]
RegisterType=holding
Address=10
DataType=uint16
Scale=0.1

[UsableCapacityRead]
RegisterType=holding
Address=20
DataType=uint16

[BatteryPowerRead]
# Signed watts:
#   negative = charging battery
#   positive = discharging battery
RegisterType=holding
Address=30
DataType=int16

[AcPowerRead]
RegisterType=holding
Address=40
DataType=uint16
