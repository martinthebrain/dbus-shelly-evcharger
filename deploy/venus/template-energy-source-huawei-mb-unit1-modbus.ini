[Adapter]
# Huawei SUN2000 MB-family hybrid template for energy storage unit 1.
Transport=tcp

[Transport]
Host=192.168.200.1
Port=6607
UnitId=0
RequestTimeoutSeconds=2.0

[SocRead]
RegisterType=holding
Address=37004
DataType=uint16
Scale=0.1

[BatteryPowerRead]
# Huawei unit-1 sign:
#   > 0 = charging
#   < 0 = discharging
# Repo sign:
#   < 0 = charging
#   > 0 = discharging
RegisterType=holding
Address=37001
DataType=int32
Scale=-1

[ChargeLimitPowerRead]
RegisterType=holding
Address=37007
DataType=uint32
Scale=1

[DischargeLimitPowerRead]
RegisterType=holding
Address=37009
DataType=uint32
Scale=1

[AcPowerRead]
# Inverter-global active power. If unit1 and unit2 are configured together,
# keep this block enabled on only one of them to avoid double counting.
RegisterType=holding
Address=32080
DataType=int32
Scale=1

[PvInputPowerRead]
# Inverter-global total PV input power. If unit1 and unit2 are configured
# together, keep this block enabled on only one of them to avoid double
# counting the same inverter-wide PV total twice.
RegisterType=holding
Address=32064
DataType=int32
Scale=1

[GridInteractionRead]
# Meter-backed net grid power. This is meter-global, not unit-1-local.
# The sign is inverted so the imported value matches the repo-internal
# grid_interaction_w convention.
RegisterType=holding
Address=37113
DataType=int32
Scale=-1

[OperatingModeRead]
RegisterType=holding
Address=37006
DataType=uint16
Scale=1

[OperatingModeMap]
0=none
1=forcible_charge_discharge
2=time_of_use_lg
3=fixed_charge_discharge
4=maximise_self_consumption
5=fully_fed_to_grid
6=time_of_use_luna2000
7=remote_scheduling_maximum_self_use
8=remote_scheduling_full_internet_access
9=remote_scheduling_tou
10=ai_energy_management_and_scheduling
11=remote_scheduling_ai_energy_management
12=third_party_scheduling

[Aggregation]
AcPowerScopeKey={host}:{port}:inverter-ac-power
PvInputPowerScopeKey={host}:{port}:inverter-pv-input-power
GridInteractionScopeKey={host}:{port}:meter-active-power
