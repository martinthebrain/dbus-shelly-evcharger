[Adapter]
# OpenDTU aggregate PV source for AutoEnergySource.<id>.Type=opendtu_http
BaseUrl=http://opendtu.local
RequestTimeoutSeconds=2.0

# Optional authentication when your OpenDTU endpoint is protected.
Username=
Password=
DigestAuth=0

[OpenDTU]
# Main status endpoint returning the inverter list and total power.
StatusUrl=/api/livedata/status

# Older OpenDTU API shapes may need one additional request per inverter.
InverterStatusUrl=/api/livedata/status?inv=${serial}

# Optional comma-separated filter when only selected inverter serials should
# contribute to this source.
InverterSerials=

# Mark inverter data as stale after this age in seconds.
MaxDataAgeSeconds=600
