[Command]
# Generic example for AutoEnergySource.<id>.Type=command_json
# This is the recommended bridge seam for custom vendor SDK wrappers or MQTT
# subscribers that should stay outside the wallbox core.
Args=python3 /data/bin/external-energy-helper.py --once
TimeoutSeconds=2.0

[Response]
SocPath=data.soc
UsableCapacityWhPath=data.capacity_wh

# Signed watts:
#   negative = charging battery
#   positive = discharging battery
BatteryPowerPath=data.battery_power_w
AcPowerPath=data.ac_power_w
OnlinePath=data.online
ConfidencePath=data.confidence
