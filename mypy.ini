[mypy]
python_version = 3.12
warn_unused_configs = True
show_error_codes = True
pretty = True
check_untyped_defs = True
disallow_incomplete_defs = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
files = dbus_shelly_wallbox_common.py, dbus_shelly_wallbox_ports.py, dbus_shelly_wallbox_auto_controller.py, dbus_shelly_wallbox_auto_logic.py, dbus_shelly_wallbox_dbus_inputs.py, dbus_shelly_wallbox_bootstrap.py, dbus_shelly_wallbox_runtime_support.py, dbus_shelly_wallbox_write_controller.py, dbus_shelly_wallbox_update_cycle.py, tests/test_shelly_wallbox_ports.py

[mypy-dbus]
ignore_missing_imports = True

[mypy-dbus.*]
ignore_missing_imports = True

[mypy-vedbus]
ignore_missing_imports = True

[mypy-requests]
ignore_missing_imports = True

[mypy-requests.*]
ignore_missing_imports = True
