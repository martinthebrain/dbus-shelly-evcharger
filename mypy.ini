[mypy]
python_version = 3.12
warn_unused_configs = True
show_error_codes = True
pretty = True
check_untyped_defs = True
disallow_incomplete_defs = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
files = venus_evcharger/core/common.py, venus_evcharger/ports/__init__.py, venus_evcharger/controllers/auto.py, venus_evcharger/auto/workflow.py, venus_evcharger/inputs/dbus.py, venus_evcharger/bootstrap/controller.py, venus_evcharger/runtime/support.py, venus_evcharger/controllers/write.py, venus_evcharger/update/controller.py, tests/test_venus_evcharger_ports.py

[mypy-dbus]
ignore_missing_imports = True

[mypy-dbus.*]
ignore_missing_imports = True

[mypy-vedbus]
ignore_missing_imports = True

[mypy-requests]
ignore_missing_imports = True

[mypy-requests.*]
ignore_missing_imports = True
