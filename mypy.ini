[mypy]
python_version = 3.12
warn_unused_configs = True
show_error_codes = True
pretty = True
check_untyped_defs = True
disallow_incomplete_defs = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
files = shelly_wallbox/core/common.py, shelly_wallbox/ports/__init__.py, shelly_wallbox/controllers/auto.py, shelly_wallbox/auto/workflow.py, shelly_wallbox/inputs/dbus.py, shelly_wallbox/bootstrap/controller.py, shelly_wallbox/runtime/support.py, shelly_wallbox/controllers/write.py, shelly_wallbox/update/controller.py, tests/test_shelly_wallbox_ports.py

[mypy-dbus]
ignore_missing_imports = True

[mypy-dbus.*]
ignore_missing_imports = True

[mypy-vedbus]
ignore_missing_imports = True

[mypy-requests]
ignore_missing_imports = True

[mypy-requests.*]
ignore_missing_imports = True
